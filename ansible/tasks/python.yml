---
- name: Instalação de Python e Pip
  become: yes
  package:
    name: "{{ python_packages[ansible_facts['distribution']] }}"
    state: present
  vars:
    python_packages:
      Ubuntu:
        - "python3"
        - "python3-pip"
        - "python3-venv"
      Archlinux:
        - "python"
        - "python-pip"
      CachyOS:
        - "python"
        - "python-pip"
