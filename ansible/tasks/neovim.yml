---
- name: Instalar Neovim (Arch/CachyOS)
  when: ansible_facts['distribution'] in ["Archlinux", "CachyOS"]
  become: yes
  package:
    name: neovim
    state: present
  tags: packages

- name: Aplicar (stow) dotfiles do Neovim
  command:
    cmd: "stow --adopt nvim"
    chdir: "{{ dotfiles_dir }}"
  tags: dotfiles
