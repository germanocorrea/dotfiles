- name: Configurar Virtualizacao
  tags:
    - personal
  block:
    - name: Instalar pacotes
      become: yes
      package:
        name:
          - libvirt
          - virt-manager
          - qemu-full
        state: present
      tags: packages

    - name: Habilitar e iniciar libvirtd.socket
      become: yes
      ansible.builtin.systemd:
        name: libvirtd.socket
        enabled: true
        state: started
